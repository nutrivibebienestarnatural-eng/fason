<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin Nutrivibe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surface:#161a23;--surface2:#1e2330;--border:#2a3040;--accent:#c8a96e;--accent2:#e8c98e;--text:#eef0f5;--muted:#7a849a;--success:#4caf88;--error:#e05c6a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.lbox{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:44px 40px;width:100%;max-width:400px;position:relative;overflow:hidden;}
.lbox::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.llogo{text-align:center;margin-bottom:30px;}
.llogo .ico{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px;}
.llogo h1{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--accent2);}
.llogo p{font-size:.78rem;color:var(--muted);margin-top:4px;}
.lf{margin-bottom:18px;}
.lf label{display:block;font-size:.75rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.lf input{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;}
.lf input:focus{border-color:var(--accent);}
.btnlogin{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0d0f14;border:none;border-radius:8px;font-size:.95rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;}
.lerr{color:var(--error);font-size:.82rem;text-align:center;margin-top:12px;display:none;}
.lhint{font-size:.74rem;color:var(--muted);text-align:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
.lhint strong{color:var(--accent);}
#adminScreen{display:none;}
.header{background:linear-gradient(135deg,var(--surface),#1a1f2e);border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.hleft{display:flex;align-items:center;gap:12px;}
.hico{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.header h1{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--accent2);}
.hright{display:flex;gap:10px;}
.bs{padding:7px 16px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s;font-weight:500;}
.bo{background:transparent;border:1px solid rgba(200,169,110,.35);color:var(--accent);text-decoration:none;}
.bo:hover{background:rgba(200,169,110,.08);}
.bd{background:rgba(224,92,106,.1);border:1px solid rgba(224,92,106,.3);color:var(--error);}
.ba{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#0d0f14;font-weight:700;}
.abody{max-width:1200px;margin:0 auto;padding:28px 20px 60px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;text-align:center;}
.snum{font-size:1.9rem;font-weight:800;}
.slbl{font-size:.78rem;color:var(--muted);margin-top:3px;}
.toolbar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.fb{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.78rem;font-family:'DM Sans',sans-serif;}
.fb.on{background:var(--accent);border-color:var(--accent);color:#0d0f14;font-weight:600;}
.srch{margin-left:auto;padding:7px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.83rem;outline:none;width:200px;}
.twrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead tr{background:rgba(200,169,110,.07);}
th{padding:12px 16px;font-size:.72rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;text-align:left;border-bottom:1px solid var(--border);}
td{padding:13px 16px;font-size:.86rem;border-bottom:1px solid rgba(42,48,64,.6);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.dr:hover{background:rgba(200,169,110,.04);cursor:pointer;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600;}
.bn{background:rgba(96,165,250,.15);color:#60a5fa;border:1px solid rgba(96,165,250,.3);}
.bp{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
.bc{background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid rgba(167,139,250,.3);}
.br{background:rgba(76,175,136,.15);color:#4caf88;border:1px solid rgba(76,175,136,.3);}
.bx{background:rgba(224,92,106,.15);color:#e05c6a;border:1px solid rgba(224,92,106,.3);}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .22s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:linear-gradient(135deg,#1a1f2e,var(--bg));border:1px solid rgba(200,169,110,.25);border-radius:18px;padding:32px 36px;max-width:660px;width:100%;max-height:90vh;overflow-y:auto;transform:translateY(18px);transition:transform .22s;}
.overlay.open .modal{transform:translateY(0);}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.mhead h2{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--accent2);}
.bclose{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.4rem;}
.ipill{background:rgba(200,169,110,.07);border:1px solid rgba(200,169,110,.18);border-radius:10px;padding:14px 18px;margin-bottom:18px;}
.iname{font-weight:700;font-size:1rem;margin-bottom:4px;}
.imeta{font-size:.82rem;color:var(--muted);}
.divider{height:1px;background:var(--border);margin:20px 0;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.mf{display:flex;flex-direction:column;gap:5px;}
.mf label{font-size:.72rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;}
.mf input,.mf select,.mf textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;width:100%;}
.mf textarea{resize:vertical;min-height:90px;}
.mactions{display:flex;gap:9px;justify-content:flex-end;flex-wrap:wrap;margin-top:22px;}
.pchips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
.pchip{background:rgba(200,169,110,.1);border:1px solid rgba(200,169,110,.25);border-radius:6px;padding:5px 13px;font-size:.78rem;color:var(--accent2);}
.ct{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:8px;}
.ct th{padding:4px 10px;font-size:.7rem;color:var(--muted);text-transform:uppercase;text-align:left;border-bottom:1px solid var(--border);}
.ct td{padding:6px 10px;border-bottom:1px solid rgba(42,48,64,.4);color:#94a3b8;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 22px;display:flex;align-items:center;gap:10px;font-size:.87rem;transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:999;min-width:260px;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(--success);}
.toast.error{border-color:var(--error);}
@media(max-width:700px){.stats{grid-template-columns:1fr 1fr;}.mgrid{grid-template-columns:1fr;}.modal{padding:24px 18px;}.abody{padding:16px 12px 50px;}}
</style>
</head>
<body>
<div id="loginScreen">
  <div class="lbox">
    <div class="llogo"><div class="ico">&#128274;</div><h1>Panel Admin</h1><p>Nutrivibe &middot; Sistema de gesti&oacute;n</p></div>
    <div class="lf"><label>Usuario</label><input type="text" id="lu" placeholder="admin" onkeydown="if(event.key==='Enter')login()"></div>
    <div class="lf"><label>Contrase&ntilde;a</label><input type="password" id="lp" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" onkeydown="if(event.key==='Enter')login()"></div>
    <div class="lerr" id="lerr">Usuario o contrase&ntilde;a incorrectos</div>
    <button class="btnlogin" onclick="login()">Ingresar al sistema</button>
    <div class="lhint">Demo: <strong>admin</strong> / <strong>admin123</strong></div>
  </div>
</div>
<div id="adminScreen">
  <div class="header">
    <div class="hleft"><div class="hico">&#128202;</div><div><h1>Gesti&oacute;n de Clientes</h1></div></div>
    <div class="hright">
      <a href="formulario_ingreso_cliente.html" class="bs bo">+ Nuevo cliente</a>
      <button class="bs bd" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="abody">
    <div class="stats" id="statsRow"></div>
    <div class="toolbar">
      <button class="fb on" onclick="setF('todos',this)">Todos</button>
      <button class="fb" onclick="setF('nuevo',this)">Nuevos</button>
      <button class="fb" onclick="setF('en_proceso',this)">En proceso</button>
      <button class="fb" onclick="setF('cita_agendada',this)">Con cita</button>
      <button class="fb" onclick="setF('resuelto',this)">Resueltos</button>
      <input class="srch" type="text" placeholder="Buscar..." id="srch" oninput="renderTable()">
    </div>
    <div class="twrap">
      <table>
        <thead><tr><th>Cliente</th><th>Empresa</th><th>Email</th><th>Productos</th><th>Fecha</th><th>Estado</th><th>Cita</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>
<div class="overlay" id="detModal">
  <div class="modal">
    <div class="mhead"><h2>Detalle del cliente</h2><button class="bclose" onclick="closeM('detModal')">&#x2715;</button></div>
    <div class="ipill"><div class="iname" id="d_nombre"></div><div class="imeta" id="d_meta"></div></div>
    <div id="d_prods_sec" style="margin-bottom:16px;display:none;">
      <div style="font-size:.72rem;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Productos</div>
      <div class="pchips" id="d_prods_chips"></div>
    </div>
    <div id="d_comp_sec" style="display:none;margin-bottom:16px;">
      <div style="font-size:.72rem;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Componentes</div>
      <table class="ct"><thead><tr><th>Componente</th><th>Cantidad</th><th>Beneficio</th></tr></thead><tbody id="d_comp_tbody"></tbody></table>
    </div>
    <div class="divider"></div>
    <div class="mgrid">
      <div class="mf"><label>Estado</label>
        <select id="d_estado">
          <option value="nuevo">Nuevo</option><option value="en_proceso">En proceso</option>
          <option value="cita_agendada">Cita agendada</option><option value="resuelto">Resuelto</option><option value="cancelado">Cancelado</option>
        </select>
      </div>
      <div class="mf"><label>Agendar cita</label><input type="datetime-local" id="d_cita"></div>
    </div>
    <div class="mf" style="margin-top:14px;"><label>Notas internas</label><textarea id="d_notas" placeholder="Notas privadas..."></textarea></div>
    <div class="mactions">
      <button class="bs bd" onclick="eliminar()">Eliminar</button>
      <button class="bs bo" onclick="closeM('detModal')">Cancelar</button>
      <button class="bs ba" onclick="guardar()">Guardar cambios</button>
    </div>
  </div>
</div>
<div class="toast" id="toastEl"><span id="toastMsg"></span></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,onSnapshot,doc,updateDoc,deleteDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyC_2ypEPBCQrm4R7edD9yl3N1jDcfeoh5I",authDomain:"fason-ba9d4.firebaseapp.com",projectId:"fason-ba9d4",storageBucket:"fason-ba9d4.firebasestorage.app",messagingSenderId:"1080419549484",appId:"1:1080419549484:web:dff69ef588b4eeecd92c89"};
const db=getFirestore(initializeApp(cfg));
const CR={user:'admin',pass:'admin123'};
const EST={nuevo:{l:'Nuevo',c:'bn'},en_proceso:{l:'En proceso',c:'bp'},cita_agendada:{l:'Cita',c:'bc'},resuelto:{l:'Resuelto',c:'br'},cancelado:{l:'Cancelado',c:'bx'}};
let filtro='todos',curId=null,clientes=[],unsub=null;
window.login=()=>{
  const u=document.getElementById('lu').value.trim(),p=document.getElementById('lp').value;
  if(u===CR.user&&p===CR.pass){document.getElementById('loginScreen').style.display='none';document.getElementById('adminScreen').style.display='block';escuchar();}
  else{const e=document.getElementById('lerr');e.style.display='block';setTimeout(()=>e.style.display='none',3000);}
};
window.logout=()=>{if(unsub)unsub();document.getElementById('adminScreen').style.display='none';document.getElementById('loginScreen').style.display='flex';};
function escuchar(){
  unsub=onSnapshot(collection(db,'clientes'),snap=>{
    clientes=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>new Date(b.creadoEn)-new Date(a.creadoEn));
    renderStats();renderTable();
  },()=>toast('Error al conectar','error'));
}
function renderStats(){
  const s={t:clientes.length,n:clientes.filter(c=>c.estado==='nuevo').length,p:clientes.filter(c=>c.estado==='en_proceso').length,r:clientes.filter(c=>c.estado==='resuelto').length};
  document.getElementById('statsRow').innerHTML=[{n:s.t,l:'Total',c:'#c8a96e'},{n:s.n,l:'Nuevos',c:'#60a5fa'},{n:s.p,l:'En proceso',c:'#fbbf24'},{n:s.r,l:'Resueltos',c:'#4caf88'}].map(x=>`<div class="stat"><div class="snum" style="color:${x.c}">${x.n}</div><div class="slbl">${x.l}</div></div>`).join('');
}
window.setF=(f,btn)=>{filtro=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderTable();};
function renderTable(){
  const s=document.getElementById('srch').value.toLowerCase();
  const all=clientes.filter(c=>(filtro==='todos'||c.estado===filtro)&&(!s||[c.nombre,c.empresa,c.email,c.cargo,c.telefono].some(v=>v&&v.toLowerCase().includes(s))));
  const tb=document.getElementById('tbody');
  if(!all.length){tb.innerHTML='<tr><td colspan="7"><div class="empty">Sin resultados</div></td></tr>';return;}
  const fmt=i=>i?new Date(i).toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'2-digit'}):'--';
  tb.innerHTML=all.map(c=>{
    const pr=(c.productos||[]).filter(p=>p.nombre||p.marca).slice(0,2).map(p=>p.nombre||p.marca).join(', ')||'--';
    const e=EST[c.estado]||EST.nuevo;
    const ct=c.cita?`<span style="color:#a78bfa">${fmt(c.cita)}</span>`:'<span style="color:var(--muted)">--</span>';
    return `<tr class="dr" onclick="abrirDetalle('${c.id}')"><td><strong>${c.nombre||'--'}</strong></td><td>${c.empresa||'--'}</td><td style="color:#7aabf8;font-size:.82rem">${c.email||'--'}</td><td style="font-size:.8rem;color:var(--muted);max-width:130px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${pr}</td><td style="font-size:.82rem">${fmt(c.fechaContacto||c.creadoEn)}</td><td><span class="badge ${e.c}">${e.l}</span></td><td>${ct}</td></tr>`;
  }).join('');
}
window.abrirDetalle=id=>{
  curId=id;const c=clientes.find(x=>x.id===id);if(!c)return;
  document.getElementById('d_nombre').textContent=c.nombre;
  document.getElementById('d_meta').innerHTML=`Email: ${c.email||'--'}${c.telefono?' | Tel: '+c.telefono:''}${c.cargo?' | '+c.cargo:''}<br><small>Empresa: ${c.empresa||'--'} | Ingresado: ${new Date(c.creadoEn).toLocaleDateString('es-AR')}</small>`;
  document.getElementById('d_estado').value=c.estado||'nuevo';
  document.getElementById('d_cita').value=c.cita||'';
  document.getElementById('d_notas').value=c.notas||'';
  const pr=(c.productos||[]).filter(p=>p.nombre||p.marca);
  const ps=document.getElementById('d_prods_sec');
  if(pr.length){ps.style.display='block';document.getElementById('d_prods_chips').innerHTML=pr.map(p=>`<div class="pchip">${p.marca?p.marca+' - ':''}${p.nombre}</div>`).join('');}else ps.style.display='none';
  const co=pr.length?(pr[0].componentes||[]):[];
  const cs=document.getElementById('d_comp_sec');
  if(co.length){cs.style.display='block';document.getElementById('d_comp_tbody').innerHTML=co.map(x=>`<tr><td>${x.componente}</td><td>${x.cantidad}</td><td>${x.beneficio}</td></tr>`).join('');}else cs.style.display='none';
  document.getElementById('detModal').classList.add('open');
};
window.guardar=async()=>{
  try{await updateDoc(doc(db,'clientes',curId),{estado:document.getElementById('d_estado').value,cita:document.getElementById('d_cita').value||null,notas:document.getElementById('d_notas').value});closeM('detModal');toast('Cambios guardados','success');}catch(e){toast('Error al guardar','error');}
};
window.eliminar=async()=>{
  if(!confirm('Eliminar este cliente?'))return;
  try{await deleteDoc(doc(db,'clientes',curId));closeM('detModal');toast('Cliente eliminado','error');}catch(e){toast('Error','error');}
};
window.openM=id=>document.getElementById(id).classList.add('open');
window.closeM=id=>document.getElementById(id).classList.remove('open');
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function toast(msg,tipo){const t=document.getElementById('toastEl');document.getElementById('toastMsg').textContent=msg;t.className='toast '+tipo+' show';setTimeout(()=>t.classList.remove('show'),3500);}
</script>
</body>
</html>
